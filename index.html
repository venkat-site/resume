<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Venkataraman Swamynathan — Strategic Technical Leader</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0c10;
    --bg-card: #111318;
    --bg-card2: #161921;
    --accent: #00d4a0;
    --accent2: #0096ff;
    --accent-dim: rgba(0,212,160,0.12);
    --accent2-dim: rgba(0,150,255,0.1);
    --text: #e8eaf0;
    --text-muted: #7a8494;
    --text-dim: #4a5162;
    --border: rgba(255,255,255,0.07);
    --border-accent: rgba(0,212,160,0.25);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    line-height: 1.7;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,160,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 5vw;
    height: 64px;
    background: rgba(10,12,16,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-decoration: none;
  }

  .nav-links { display: flex; gap: 1.5rem; list-style: none; }
  .nav-links a {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    text-decoration: none;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--accent); }

  section { position: relative; z-index: 1; padding: 80px 0; }
  .container { max-width: 900px; margin: 0 auto; padding: 0 5vw; }

  .section-header { display: flex; align-items: center; gap: 16px; margin-bottom: 2rem; }
  .section-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); text-transform: uppercase; }
  .section-line { flex: 1; height: 1px; background: var(--border); }
  h2 { font-family: 'DM Serif Display', serif; font-size: 2.5rem; color: var(--text); margin-bottom: 1rem; }

  /* HERO */
  #hero { min-height: 100vh; display: flex; align-items: center; padding: 120px 5vw 60px; }
  .hero-eyebrow { display: inline-flex; align-items: center; gap: 8px; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1.5rem; }
  h1 { font-family: 'DM Serif Display', serif; font-size: clamp(3rem, 7vw, 5rem); line-height: 1.05; letter-spacing: -0.02em; color: var(--text); margin-bottom: 1.5rem; }
  h1 em { font-style: italic; color: var(--accent); }
  
  .hero-sub { 
    font-size: 1rem; 
    color: var(--text-muted); 
    max-width: 750px; 
    margin-bottom: 2rem; 
    font-weight: 300; 
    line-height: 1.8; 
    text-align: justify; 
  }

  .specialization-list {
    margin-top: 1.5rem;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
  }

  .spec-item b { color: var(--accent); font-weight: 500; display: block; margin-bottom: 4px; }
  .spec-item { font-size: 14px; color: var(--text-muted); }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 28px;
    background: var(--accent);
    color: #0a0c10;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    transition: transform 0.15s;
    margin-top: 2rem;
  }

  /* INSIGHTS / KNOWLEDGE HUB */
  .insights-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 1rem; }
  .insight-card { 
    background: var(--bg-card); 
    border: 1px solid var(--border); 
    padding: 1.5rem; 
    border-radius: var(--radius); 
    transition: all 0.3s ease;
  }
  .insight-card:hover { border-color: var(--accent); transform: translateY(-5px); background: var(--bg-card2); }
  .insight-type { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); text-transform: uppercase; margin-bottom: 0.5rem; display: block; }
  .insight-card h4 { font-size: 1.1rem; margin-bottom: 0.75rem; color: var(--text); }
  .insight-content { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
  .mgmt-highlight { border-left: 2px solid var(--accent2); padding-left: 0.75rem; margin-top: 0.75rem; font-style: italic; font-size: 12px; color: var(--text); }

  .timeline { position: relative; padding-left: 28px; margin-top: 1rem; }
